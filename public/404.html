<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // 单页应用路由重定向
    // 将路径保存到 sessionStorage，然后重定向到首页
    sessionStorage.redirect = location.pathname + location.search + location.hash
  </script>
  <meta http-equiv="refresh" content="0;URL='/blog/'">
</head>
<body>
  Redirecting...
</body>
</html>
